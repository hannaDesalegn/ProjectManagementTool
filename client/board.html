<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board - HayTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8b5cf6',
                        secondary: '#ec4899',
                        dark: {
                            bg: '#0a0a0f',
                            card: '#1a1a2e',
                            border: '#2d2d44'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'bounce-slow': 'bounce 2s infinite'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        body {
            background: #0a0a0f;
            overflow-x: hidden;
        }
        
        .glass-effect {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.1);
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2);
        }
        
        .sortable-ghost {
            opacity: 0.5;
            background: rgba(139, 92, 246, 0.2);
        }
        
        .sortable-chosen {
            transform: rotate(5deg);
        }
        
        .sortable-drag {
            transform: rotate(10deg);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }
        
        .list-container {
            min-height: 200px;
        }
        
        .floating-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            animation: float 8s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .priority-high { border-left: 4px solid #ef4444; }
        .priority-medium { border-left: 4px solid #f59e0b; }
        .priority-low { border-left: 4px solid #10b981; }
        
        .card-labels {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        
        .card-label {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
        }
    </style>
</head>

<body class="min-h-screen relative">
    <!-- Floating Background Shapes -->
    <div class="floating-shape w-96 h-96 bg-purple-500 top-0 -left-48" style="animation-delay: 0s;"></div>
    <div class="floating-shape w-96 h-96 bg-pink-500 bottom-0 -right-48" style="animation-delay: 2s;"></div>
    <div class="floating-shape w-64 h-64 bg-blue-500 top-1/2 left-1/2" style="animation-delay: 4s;"></div>

    <!-- Header -->
    <header class="glass-effect border-b border-[#2d2d44] p-4 relative z-10">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button type="button" onclick="goBack()" class="p-2 hover:bg-purple-500/10 rounded-lg transition-colors group">
                    <i class="fas fa-arrow-left text-gray-400 group-hover:text-white"></i>
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                        <span class="text-white font-bold text-sm">H</span>
                    </div>
                    <div>
                        <h1 id="boardTitle" class="text-xl font-bold text-white">Loading...</h1>
                        <p class="text-gray-400 text-sm">Kanban Board</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button type="button" onclick="toggleBoardSettings()" class="p-2 hover:bg-purple-500/10 rounded-lg transition-colors text-gray-400 hover:text-white">
                    <i class="fas fa-cog"></i>
                </button>
                <button type="button" onclick="addList()" class="px-4 py-2 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white rounded-lg font-medium transition-all transform hover:scale-105">
                    <i class="fas fa-plus mr-2"></i>Add List
                </button>
            </div>
        </div>
    </header>

    <!-- Board Content -->
    <main class="p-6 relative z-10">
        <div id="boardContainer" class="flex gap-6 overflow-x-auto pb-6">
            <!-- Lists will be loaded here -->
            <div class="flex-shrink-0 w-80 animate-pulse">
                <div class="glass-effect rounded-xl p-4">
                    <div class="h-6 bg-gray-700 rounded mb-4"></div>
                    <div class="space-y-3">
                        <div class="h-20 bg-gray-800 rounded"></div>
                        <div class="h-16 bg-gray-800 rounded"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Board Settings Modal -->
    <div id="boardSettingsModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="glass-effect rounded-3xl w-full max-w-md animate-scale-in">
            <div class="p-6 border-b border-gray-700">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-bold text-white">Board Settings</h3>
                    <button onclick="toggleBoardSettings()" class="p-2 hover:bg-gray-800 rounded-lg transition-colors">
                        <i class="fas fa-times text-gray-400"></i>
                    </button>
                </div>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-gray-300 text-sm mb-2">Board Name</label>
                    <input type="text" id="boardNameInput" class="w-full px-4 py-3 bg-[#0a0a0f] border border-gray-700 rounded-xl text-white">
                </div>
                <div>
                    <label class="block text-gray-300 text-sm mb-2">Background</label>
                    <div class="grid grid-cols-4 gap-2">
                        <button class="w-full h-12 rounded-lg bg-gradient-to-br from-purple-500 to-pink-500 border-2 border-transparent hover:border-white"></button>
                        <button class="w-full h-12 rounded-lg bg-gradient-to-br from-blue-500 to-cyan-500 border-2 border-transparent hover:border-white"></button>
                        <button class="w-full h-12 rounded-lg bg-gradient-to-br from-green-500 to-emerald-500 border-2 border-transparent hover:border-white"></button>
                        <button class="w-full h-12 rounded-lg bg-gradient-to-br from-orange-500 to-red-500 border-2 border-transparent hover:border-white"></button>
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="saveBoardSettings()" class="flex-1 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-xl font-medium">
                        Save Changes
                    </button>
                    <button onclick="deleteBoardConfirm()" class="px-4 py-3 bg-red-500/20 hover:bg-red-500/30 text-red-400 rounded-xl font-medium">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Card Detail Modal -->
    <div id="cardDetailModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="glass-effect rounded-3xl w-full max-w-2xl max-h-[80vh] overflow-y-auto">
            <div class="sticky top-0 bg-[#1a1a2e]/95 backdrop-blur-sm px-6 py-4 border-b border-gray-700 flex items-center justify-between rounded-t-3xl">
                <h3 id="cardDetailTitle" class="text-xl font-bold text-white">Card Details</h3>
                <button onclick="closeCardDetail()" class="p-2 hover:bg-gray-800 rounded-lg transition-colors">
                    <i class="fas fa-times text-gray-400"></i>
                </button>
            </div>
            <div id="cardDetailContent" class="p-6">
                <!-- Card details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Quick Add Card -->
    <div id="quickAddCard" class="fixed bottom-6 right-6 z-40">
        <button onclick="showQuickAdd()" class="w-14 h-14 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white rounded-full shadow-lg hover:shadow-xl transition-all transform hover:scale-110">
            <i class="fas fa-plus text-xl"></i>
        </button>
    </div>

    <!-- Notification -->
    <div id="notification" class="fixed top-4 right-4 z-50 transform translate-x-full transition-transform duration-300"></div>

    <!-- Scripts -->
    <script src="js/board.js"></script>
    
    <script>
        // Board settings functions
        function toggleBoardSettings() {
            const modal = document.getElementById('boardSettingsModal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
            
            if (!modal.classList.contains('hidden')) {
                document.getElementById('boardNameInput').value = currentBoard?.name || '';
            }
        }
        
        function saveBoardSettings() {
            const newName = document.getElementById('boardNameInput').value;
            if (newName && newName !== currentBoard?.name) {
                document.getElementById('boardTitle').textContent = newName;
                showNotification('Board settings saved!', 'success');
            }
            toggleBoardSettings();
        }
        
        function deleteBoardConfirm() {
            if (confirm('Are you sure you want to delete this board? This action cannot be undone.')) {
                showNotification('Board deleted', 'info');
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1500);
            }
        }
        
        function closeCardDetail() {
            const modal = document.getElementById('cardDetailModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
        
        function showQuickAdd() {
            const listType = prompt('Which list? (todo/progress/done)', 'todo');
            if (listType && ['todo', 'progress', 'done'].includes(listType)) {
                addCard(listType);
            }
        }
        
        // Initialize drag and drop when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            // This will be called after lists are loaded
            setTimeout(initializeDragAndDrop, 1000);
        });
        
        function initializeDragAndDrop() {
            const lists = document.querySelectorAll('[id$="Cards"]');
            lists.forEach(list => {
                if (list.id !== 'boardContainer') {
                    new Sortable(list, {
                        group: 'cards',
                        animation: 150,
                        ghostClass: 'sortable-ghost',
                        chosenClass: 'sortable-chosen',
                        dragClass: 'sortable-drag',
                        onEnd: function(evt) {
                            showNotification('Card moved!', 'success');
                        }
                    });
                }
            });
        }
    </script>
</body>

</html>
