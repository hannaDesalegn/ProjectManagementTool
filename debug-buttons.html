<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Buttons - HayTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-2xl font-bold mb-6">Button Debug Test</h1>
    
    <div class="space-y-4">
        <button onclick="testAlert()" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded">
            Test Alert
        </button>
        
        <button onclick="testConsole()" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded">
            Test Console Log
        </button>
        
        <button onclick="testFetch()" class="px-4 py-2 bg-purple-500 hover:bg-purple-600 text-white rounded">
            Test API Call
        </button>
        
        <button onclick="checkAuth()" class="px-4 py-2 bg-yellow-500 hover:bg-yellow-600 text-white rounded">
            Check Auth
        </button>
    </div>
    
    <div id="results" class="mt-6 p-4 bg-gray-800 rounded">
        <h3 class="font-bold mb-2">Results:</h3>
        <div id="output"></div>
    </div>

    <script>
        function testAlert() {
            alert('Button click works!');
            addOutput('✅ Alert test passed');
        }
        
        function testConsole() {
            console.log('Console test works!');
            addOutput('✅ Console test passed - check browser console');
        }
        
        async function testFetch() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                addOutput('✅ API call works: ' + JSON.stringify(data));
            } catch (error) {
                addOutput('❌ API call failed: ' + error.message);
            }
        }
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            addOutput('Token exists: ' + (token ? '✅ YES' : '❌ NO'));
            addOutput('User exists: ' + (user ? '✅ YES' : '❌ NO'));
            
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    addOutput('User data: ' + JSON.stringify(userData));
                } catch (e) {
                    addOutput('❌ Invalid user data in localStorage');
                }
            }
        }
        
        function addOutput(message) {
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            div.className = 'mb-1';
            output.appendChild(div);
        }
        
        // Test on page load
        document.addEventListener('DOMContentLoaded', () => {
            addOutput('🚀 Page loaded successfully');
            checkAuth();
        });
    </script>
</body>
</html>
